name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/

      - name: Install pandoc
        run: |
          PANDOC_VERSION="3.9.0.2"
          curl -sL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv "pandoc-${PANDOC_VERSION}/bin/pandoc" /usr/local/bin/
          rm -rf "pandoc-${PANDOC_VERSION}"

      - name: Install typst
        run: |
          TYPST_VERSION="0.14.2"
          curl -sL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" | tar xJ
          sudo mv "typst-x86_64-unknown-linux-musl/typst" /usr/local/bin/
          rm -rf "typst-x86_64-unknown-linux-musl"

      - name: Build CV PDF
        run: |
          mkdir -p .build
          sed -e '/^+++$/,/^+++$/d' \
              -e '/<figure class="cv-margin-photo"/,/<\/figure>/d' \
              content/cv/_index.md > .build/cv.md
          pandoc .build/cv.md -o .build/cv.typ -t typst \
              --template=templates/pandoc-cv.typ \
              --lua-filter=scripts/cv-shortcodes.lua \
              --from=markdown-smart \
              --standalone --wrap=none \
              -V author="Mossa Merhi Reimert" \
              -V location="Copenhagen, Denmark" \
              -V email="mossa@a2-ai.com" \
              -V github="cgmossa" \
              -V linkedin="cgmossa" \
              -V personal-site="cgmossa.github.io"
          typst compile .build/cv.typ static/cv.pdf

      - name: Build site
        run: zola build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Fix permissions
        run: |
          chmod -c -R +rX "public" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
