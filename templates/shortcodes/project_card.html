{%- set tags = tags | default(value="") -%}
<div class="project-card">
<h3><a href="{{ url }}" target="_blank" rel="noopener">{{ title }}</a></h3>
{{ body }}
{%- if tags %}
<div class="project-tags">
{%- for tag in tags | split(pat=",") %}
<span>{{ tag | trim }}</span>
{%- endfor %}
</div>
{%- endif %}
</div>
