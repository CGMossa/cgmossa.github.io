{% extends "base.html" %}

{% block title %}404 - Page not found | {{ config.title }}{% endblock %}

{% block content %}
<article class="section-page error-page">
  <div class="error-card">
    <p class="eyebrow">404</p>
    <h1>Page not found</h1>
    <p>The page you were looking for does not exist, or it moved while I was busy rewriting the site.</p>
    <p><a href="{{ get_url(path='/') }}" class="btn">Back to home</a></p>
  </div>
</article>
{% endblock %}
