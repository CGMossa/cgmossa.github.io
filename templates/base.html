<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <link rel="stylesheet" href="{{ get_url(path='style.css', cachebust=true) }}">
  <link rel="alternate" type="application/atom+xml" title="RSS" href="{{ get_url(path='atom.xml', trailing_slash=false) }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-logo" href="{{ get_url(path='/') }}">MMR</a>
      <div class="nav-links">
        <a href="{{ get_url(path='/') }}" {% if current_path is defined and current_path == "/" %}class="active"{% endif %}>Home</a>
        <a href="{{ get_url(path='@/cv/_index.md') }}" {% if current_path is defined and current_path is starting_with("/cv") %}class="active"{% endif %}>CV</a>
        <a href="{{ get_url(path='@/projects/_index.md') }}" {% if current_path is defined and current_path is starting_with("/projects") %}class="active"{% endif %}>Projects</a>
        <a href="{{ get_url(path='@/blog/_index.md') }}" {% if current_path is defined and current_path is starting_with("/blog") %}class="active"{% endif %}>Blog</a>
      </div>
    </div>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="https://github.com/cgmossa" target="_blank" rel="noopener">GitHub</a>
        <a href="https://orcid.org/0009-0007-9297-1523" target="_blank" rel="noopener">ORCID</a>
        <a href="https://www.linkedin.com/in/cgmossa" target="_blank" rel="noopener">LinkedIn</a>
      </div>
      <p>&copy; {{ now() | date(format="%Y") }} Mossa Merhi Reimert</p>
    </div>
  </footer>
</body>
</html>
