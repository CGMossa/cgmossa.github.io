<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  {% if page is defined and page.description %}
  <meta name="description" content="{{ page.description }}">
  {% elif section is defined and section.description %}
  <meta name="description" content="{{ section.description }}">
  {% else %}
  <meta name="description" content="{{ config.description }}">
  {% endif %}
  <meta name="theme-color" content="#511660">
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:description" content="{% if page is defined and page.description %}{{ page.description }}{% elif section is defined and section.description %}{{ section.description }}{% else %}{{ config.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{% if current_url is defined %}{{ current_url }}{% else %}{{ config.base_url }}{% endif %}">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="{{ get_url(path='favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ get_url(path='style.css', cachebust=true) }}">
  <link rel="alternate" type="application/atom+xml" title="RSS" href="{{ get_url(path='atom.xml', trailing_slash=false) }}">
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-logo" href="{{ get_url(path='/') }}">Mossa Reimert</a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="this.classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="{{ get_url(path='/') }}" {% if current_path is defined and current_path == "/" %}class="active"{% endif %}>Home</a>
        <a href="{{ get_url(path='@/cv/_index.md') }}" {% if current_path is defined and current_path is starting_with("/cv") %}class="active"{% endif %}>CV</a>
        <a href="{{ get_url(path='@/projects/_index.md') }}" {% if current_path is defined and current_path is starting_with("/projects") %}class="active"{% endif %}>Projects</a>
        <a href="{{ get_url(path='@/blog/_index.md') }}" {% if current_path is defined and current_path is starting_with("/blog") %}class="active"{% endif %}>Blog</a>
      </div>
    </div>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="https://github.com/cgmossa" target="_blank" rel="noopener">GitHub</a>
        <a href="https://orcid.org/0009-0007-9297-1523" target="_blank" rel="noopener">ORCID</a>
        <a href="https://www.linkedin.com/in/cgmossa" target="_blank" rel="noopener">LinkedIn</a>
      </div>
      <p>&copy; {{ now() | date(format="%Y") }} Mossa Merhi Reimert</p>
    </div>
  </footer>
</body>
</html>
