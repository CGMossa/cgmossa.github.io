<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mossa Merhi Reimert</title>
  <desc id="desc">Research software, modelling, and open-source R and Rust tooling.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e7d6" />
      <stop offset="60%" stop-color="#fbf7f0" />
      <stop offset="100%" stop-color="#f2ede3" />
    </linearGradient>
    <radialGradient id="glowA" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1c6d69" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#1c6d69" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="100%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#c75b39" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#c75b39" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowA)" />
  <rect width="1200" height="630" fill="url(#glowB)" />

  <rect x="72" y="72" width="1056" height="486" rx="32" fill="#fffaf2" fill-opacity="0.82" stroke="#d9ccb8" />
  <rect x="72" y="72" width="1056" height="8" rx="4" fill="#c75b39" />

  <text x="120" y="168" fill="#1c6d69" font-family="'JetBrains Mono', monospace" font-size="28" letter-spacing="4">RESEARCH SOFTWARE, MODELLING, AND TOOLING</text>
  <text x="120" y="286" fill="#1f2b2a" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700">Mossa Merhi</text>
  <text x="120" y="372" fill="#1f2b2a" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700">Reimert</text>
  <text x="120" y="456" fill="#5f6966" font-family="'Inter', Arial, sans-serif" font-size="34">R, Rust, statistical modelling, and careful software for real-world problems.</text>

  <g transform="translate(120 505)">
    <rect width="232" height="52" rx="26" fill="#1c6d69" fill-opacity="0.10" stroke="#1c6d69" stroke-opacity="0.18" />
    <text x="116" y="33" text-anchor="middle" fill="#1c6d69" font-family="'JetBrains Mono', monospace" font-size="22" letter-spacing="2">cgmossa.github.io</text>
  </g>
